version: 1
languages:
  - go
  - rust
  - swift
diagnostic_fields:
  - rule_id
  - severity
  - message
  - file
  - line
  - column
rules:
  VET001:
    name: max-function-parameters
    default_severity: error
    default_config:
      max: 1
    language_compatibility:
      go:
        status: compatible
        implementation: implemented
      rust:
        status: compatible
        implementation: implemented
      swift:
        status: compatible
        implementation: implemented
    summary: Functions must not declare more parameters than the configured maximum.
    notes:
      - Receivers such as Go method receivers are not counted as function parameters.
  VET002:
    name: source-file-header-required
    default_severity: error
    default_config:
      required: false
    language_compatibility:
      go:
        status: compatible
        implementation: implemented
      rust:
        status: compatible
        implementation: implemented
      swift:
        status: compatible
        implementation: implemented
    summary: Source files must declare a leading file header when enabled.
    notes:
      - Go build constraints and generated-code markers do not count as file headers.
  VET003:
    name: source-file-header-min-length
    default_severity: error
    default_config:
      min: 0
    language_compatibility:
      go:
        status: compatible
        implementation: implemented
      rust:
        status: compatible
        implementation: implemented
      swift:
        status: compatible
        implementation: implemented
    summary: Source file headers must be at least the configured number of characters.
    notes:
      - A value of 0 disables the lower bound.
      - Header length is counted after stripping comment delimiters and surrounding whitespace.
  VET004:
    name: source-file-header-max-length
    default_severity: error
    default_config:
      max: 0
    language_compatibility:
      go:
        status: compatible
        implementation: implemented
      rust:
        status: compatible
        implementation: implemented
      swift:
        status: compatible
        implementation: implemented
    summary: Source file headers must be at most the configured number of characters.
    notes:
      - A value of 0 disables the upper bound.
      - Header length is counted after stripping comment delimiters and surrounding whitespace.
  VET005:
    name: max-source-file-lines
    default_severity: error
    default_config:
      max: 0
    language_compatibility:
      go:
        status: compatible
        implementation: implemented
      rust:
        status: compatible
        implementation: implemented
      swift:
        status: compatible
        implementation: implemented
    summary: Source files must not exceed the configured number of physical lines.
    notes:
      - A value of 0 disables the rule.
      - Line counts are based on physical source lines.
  VET006:
    name: max-function-body-lines
    default_severity: error
    default_config:
      max: 0
    language_compatibility:
      go:
        status: compatible
        implementation: implemented
      rust:
        status: compatible
        implementation: implemented
      swift:
        status: compatible
        implementation: implemented
    summary: Function bodies must not exceed the configured number of physical lines.
    notes:
      - A value of 0 disables the rule.
      - Body line counts exclude the opening and closing brace lines.
  VET007:
    name: function-docstring-policy
    default_severity: error
    default_config:
      policy: optional
    language_compatibility:
      go:
        status: compatible
        implementation: implemented
      rust:
        status: compatible
        implementation: implemented
      swift:
        status: compatible
        implementation: implemented
    summary: Function docstrings must follow the configured policy.
    notes:
      - Supported policies are forbidden, optional, and mandatory.
      - The rule applies to named function declarations, not function literals.
  VET008:
    name: indent-type
    default_severity: error
    default_config:
      type: language-default
    language_compatibility:
      go:
        status: compatible
        implementation: implemented
      rust:
        status: compatible
        implementation: implemented
      swift:
        status: compatible
        implementation: implemented
    summary: Source indentation must use the configured indentation type.
    notes:
      - Supported types are tabs, spaces, and language-default.
      - language-default means tabs for Go, spaces for Swift and Rust.
      - Blank lines are ignored.
      - Only leading indentation is checked.
  VET009:
    name: indent-width
    default_severity: error
    default_config:
      width: 0
    language_compatibility:
      go:
        status: compatible
        implementation: implemented
      rust:
        status: compatible
        implementation: implemented
      swift:
        status: compatible
        implementation: implemented
    summary: Space indentation must be a multiple of the configured width.
    notes:
      - A value of 0 disables the rule.
      - This rule only applies when the effective indentation type is spaces.
      - Blank lines are ignored.
      - Only leading indentation is checked.
      - Swift continuation lines are exempt so their syntax may be aligned independently of block indentation.
  VET010:
    name: function-casing
    default_severity: error
    default_config:
      enabled: false
      style: language-default
    language_compatibility:
      go:
        status: compatible
        implementation: implemented
        notes:
          - Go export visibility is determined by identifier casing; non-default styles can intentionally reject exported or unexported API names.
      rust:
        status: compatible
        implementation: implemented
      swift:
        status: compatible
        implementation: implemented
    summary: Function and method names must use the configured casing style.
    notes:
      - Supported styles are off, language-default, camelCase, UpperCamelCase, snake_case, and SNAKE_CASE_FULL_CAPS.
      - language-default means exported UpperCamelCase and unexported camelCase for Go, camelCase for Swift functions, and snake_case for Rust functions.
  VET011:
    name: variable-casing
    default_severity: error
    default_config:
      enabled: false
      style: language-default
    language_compatibility:
      go:
        status: compatible
        implementation: implemented
        notes:
          - The blank identifier is ignored.
      rust:
        status: compatible
        implementation: implemented
      swift:
        status: compatible
        implementation: implemented
    summary: Variable names must use the configured casing style.
    notes:
      - Supported styles are off, language-default, camelCase, UpperCamelCase, snake_case, and SNAKE_CASE_FULL_CAPS.
      - language-default means exported UpperCamelCase and unexported camelCase for Go, camelCase for Swift variables, and snake_case for Rust variables.
  VET012:
    name: type-casing
    default_severity: error
    default_config:
      enabled: false
      style: language-default
    language_compatibility:
      go:
        status: compatible
        implementation: implemented
      rust:
        status: compatible
        implementation: implemented
      swift:
        status: compatible
        implementation: implemented
    summary: Type names must use the configured casing style.
    notes:
      - Supported styles are off, language-default, camelCase, UpperCamelCase, snake_case, and SNAKE_CASE_FULL_CAPS.
      - language-default means exported UpperCamelCase and unexported camelCase for Go, and UpperCamelCase for Swift and Rust types.
  VET013:
    name: constant-casing
    default_severity: error
    default_config:
      enabled: false
      style: language-default
    language_compatibility:
      go:
        status: compatible
        implementation: implemented
        notes:
          - Go constants are legal in SNAKE_CASE_FULL_CAPS, but Go's idiomatic default is MixedCaps rather than screaming snake case.
      rust:
        status: compatible
        implementation: implemented
      swift:
        status: compatible
        implementation: implemented
    summary: Constant names must use the configured casing style.
    notes:
      - Supported styles are off, language-default, camelCase, UpperCamelCase, snake_case, and SNAKE_CASE_FULL_CAPS.
      - language-default means exported UpperCamelCase and unexported camelCase for Go, camelCase for Swift constants, and SNAKE_CASE_FULL_CAPS for Rust constants.
  VET014:
    name: github-actions-pinned
    default_severity: error
    default_config:
      enabled: false
    language_compatibility:
      go:
        status: compatible
        implementation: implemented
      rust:
        status: compatible
        implementation: implemented
      swift:
        status: compatible
        implementation: implemented
    summary: GitHub workflow step actions must be pinned to full-length commit SHAs when enabled.
    notes:
      - The rule is opt-in and scans .github/workflows/*.yml and .github/workflows/*.yaml by default.
      - Only jobs.<job>.steps[*].uses entries are checked.
      - Local actions beginning ./ and Docker actions beginning docker:// are ignored.
      - Valid external action pins use exactly 40 hexadecimal characters after @.
      - Job-level reusable workflow calls are ignored.
