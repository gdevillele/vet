version: 1
rules:
  max-function-parameters:
    enabled: true
    max: 5
  source-file-header:
    required: false
    min-length: 0
    max-length: 0
  max-source-file-lines:
    max: 0
  max-function-body-lines:
    max: 0
  function-docstring:
    policy: optional
  indent:
    type: language-default
    width: 0
  casing:
    enabled: false
    functions: language-default
    variables: language-default
    types: language-default
    constants: language-default
    ignore-names: []
    ignore-patterns: []
  github-actions-pinned:
    enabled: true
languages:
  go:
    files:
      - implementations/go/cmd/...
      - implementations/go/internal/...
    exclude:
      - "**/*_test.go"
  rust:
    files:
      - implementations/rust/src/...
    exclude:
      - "target/**"
  swift:
    files:
      - implementations/swift/Sources/...
    exclude:
      - "**/*Tests.swift"
